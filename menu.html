<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fresh Juice Corner</title>

<style>
body{
font-family: Arial, sans-serif;
margin:0;
background:#f7fff7;
text-align:center;
}

header{
background:#ff7b00;
color:white;
padding:20px;
font-size:28px;
font-weight:bold;
}

.container{
padding:20px;
}

.category{
margin-top:30px;
}

.category h2{
background:#2ec4b6;
color:white;
padding:10px;
border-radius:10px;
}

.menu-item{
display:flex;
justify-content:space-between;
background:white;
padding:12px;
margin:8px 0;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.price{
font-weight:bold;
color:#ff7b00;
}

footer{
margin-top:30px;
padding:10px;
background:#eee;
}
</style>
</head>

<body>

<header>
🍹 Fresh Juice Corner
</header>

<div class="container">

<div class="category">
<h2>Fresh Juices</h2>

<div class="menu-item">
<span>Orange Juice</span>
<span class="price">₹60</span>
</div>

<div class="menu-item">
<span>Mosambi Juice</span>
<span class="price">₹50</span>
</div>

<div class="menu-item">
<span>Pomegranate Juice</span>
<span class="price">₹80</span>
</div>

<div class="menu-item">
<span>Watermelon Juice</span>
<span class="price">₹50</span>
</div>

</div>


<div class="category">
<h2>Milkshakes</h2>

<div class="menu-item">
<span>Mango Milkshake</span>
<span class="price">₹90</span>
</div>

<div class="menu-item">
<span>Strawberry Milkshake</span>
<span class="price">₹100</span>
</div>

<div class="menu-item">
<span>Chocolate Milkshake</span>
<span class="price">₹110</span>
</div>

</div>


<div class="category">
<h2>Special Drinks</h2>

<div class="menu-item">
<span>Fruit Salad</span>
<span class="price">₹120</span>
</div>

<div class="menu-item">
<span>Mixed Fruit Juice</span>
<span class="price">₹100</span>
</div>

<div class="menu-item">
<span>Badam Milk</span>
<span class="price">₹70</span>
</div>

</div>

</div>

<footer>
Thank you for visiting 🍊
</footer>

</body>
</html>
